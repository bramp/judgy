name: Deploy to GitHub Pages

# Disabling automatic triggers for now as requested.
# Can be run manually via the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Build Web
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          cd apps/judgy

          # Create a dist directory to hold both builds
          mkdir -p build/dist

          # 1. Build the main app
          flutter build web --release \
            --dart-define=COMMIT_HASH=$COMMIT_HASH \
            --dart-define=BUILD_DATE="$BUILD_DATE"

          # Move main app output into dist/
          cp -r build/web/* build/dist/

          # 2. Build Widgetbook (using base-href for subdirectory hosting)
          #flutter build web --release \
          #  --target=tool/background_demo.dart \
          #  --base-href /widgetbook/

          # Move widgetbook output into dist/widgetbook/
          #mkdir -p build/dist/widgetbook
          #cp -r build/web/* build/dist/widgetbook/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/judgy/build/dist
          cname: judgy.bramp.net
