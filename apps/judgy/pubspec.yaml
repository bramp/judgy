name: judgy
description: "Apples to Apples inspired game."
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  clock: ^1.1.2
  cloud_firestore: ^6.1.3
  csv: ^7.2.0
  cupertino_icons: ^1.0.8
  firebase_ai: ^3.9.0
  firebase_analytics: ^12.1.2
  firebase_app_check: ^0.4.1+5
  firebase_auth: ^6.2.0
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  go_router: ^17.1.0
  google_sign_in: ^7.2.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  sign_in_with_apple: ^7.0.1
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  widgetbook: ^3.22.0

flutter:
  uses-material-design: true

  assets:
    - web/privacy.html
    - assets/data/bots.json
    - assets/data/nouns.csv
    - assets/data/adjectives.csv

flutter_native_splash:
  color: "#0D0E15"
  web: true
  android: true
  ios: true
